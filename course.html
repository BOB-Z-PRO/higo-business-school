    // Chapter colors mapping
    const chapterColors = {
      company: 'company',
      product: 'product',
      business: 'business',
      team: 'team',
      mindset: 'mindset'
    };

    // Render course cards
    function renderCourses(courses) {
      const grid = document.getElementById('courseGrid');
      grid.innerHTML = courses.map(course => `
        <a href="course-detail.html?id=${course.id}" class="course-card">
          <div class="course-card-header ${chapterColors[course.chapter]}"></div>
          <div class="course-card-body">
            <div class="course-card-meta">
              <span class="course-num">${course.id}</span>
              <span class="course-duration"><i class="far fa-clock"></i> ${course.duration}</span>
            </div>
            <h4 class="course-title">${course.icon} ${course.title}</h4>
            <p class="course-subtitle">${course.subtitle}</p>
            <div class="course-card-footer">
              <span class="course-category ${chapterColors[course.chapter]}">${course.chapterName}</span>
              <span class="course-status ${course.status}">${course.status === 'pending' ? '待学习' : course.status === 'in-progress' ? '进行中' : '已完成'}</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    // Filter courses
    function filterCourses() {
      const school = document.getElementById('schoolFilter').value;
      const chapter = document.getElementById('chapterFilter').value;
      const status = document.getElementById('statusFilter').value;

      let filtered = COURSES;

      if (school) {
        filtered = filtered.filter(c => c.school === school);
      }
      if (chapter) {
        filtered = filtered.filter(c => c.chapter === chapter);
      }
      if (status) {
        filtered = filtered.filter(c => c.status === status);
      }

      renderCourses(filtered);
    }

    // Initial render
    renderCourses(COURSES);

    // Listen for filter changes
    document.getElementById('schoolFilter').addEventListener('change', filterCourses);
    document.getElementById('chapterFilter').addEventListener('change', filterCourses);
    document.getElementById('statusFilter').addEventListener('change', filterCourses);
